<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>✏️ Wordle — NeonArcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="game-shell.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050510;color:#e0e0e0;font-family:'Rajdhani',sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:70px 16px 40px}
#wrap{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:400px;position:relative;z-index:1}
h1{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:#4cff91;text-shadow:0 0 20px #4cff9199;letter-spacing:3px}
#stats{display:flex;gap:20px;background:#0d0d1e;border:1px solid #1e1e3a;border-radius:12px;padding:8px 20px;width:100%;justify-content:space-around}
.sb{display:flex;flex-direction:column;align-items:center}.sl{font-size:.6rem;letter-spacing:2px;color:#444;font-family:'Orbitron',sans-serif}.sv{font-size:1rem;font-weight:700;color:#4cff91;font-family:'Orbitron',sans-serif}
#grid{display:flex;flex-direction:column;gap:6px}
.row{display:flex;gap:6px}
.tile{width:56px;height:56px;border:2px solid #1e1e3a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;transition:all .2s;background:#0d0d1e}
.tile.filled{border-color:#4cff9144;animation:pop .1s ease}
@keyframes pop{0%{transform:scale(1.1)}100%{transform:scale(1)}}
.tile.correct{background:#4cff9133;border-color:#4cff91;color:#4cff91;box-shadow:0 0 10px #4cff9144}
.tile.present{background:#ffcc0033;border-color:#ffcc00;color:#ffcc00;box-shadow:0 0 10px #ffcc0044}
.tile.absent{background:#1a1a2e;border-color:#333;color:#555}
#keyboard{display:flex;flex-direction:column;gap:6px;align-items:center}
.kb-row{display:flex;gap:5px}
.key{padding:12px 8px;min-width:32px;background:#0d0d1e;border:1px solid #1e1e3a;border-radius:6px;color:#ccc;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.key:hover{border-color:#4cff91;color:#4cff91}
.key.wide{min-width:52px;font-size:.6rem}
.key.correct{background:#4cff9133;border-color:#4cff91;color:#4cff91}
.key.present{background:#ffcc0033;border-color:#ffcc00;color:#ffcc00}
.key.absent{background:#111;border-color:#222;color:#333}
#msg{font-family:'Orbitron',sans-serif;font-size:.85rem;color:#4cff91;min-height:24px;text-align:center;letter-spacing:1px}
.btn{padding:10px 28px;background:#4cff91;color:#050510;border:none;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:transform .15s}
.btn:hover{transform:scale(1.05)}
</style>
</head>
<body>
<nav class="game-nav"><a href="index.html" class="back-btn">← Hub</a><span class="game-nav-title">✏️ Wordle</span><span class="game-nav-hs">🏆 <span id="nav-hs">0</span></span></nav>
<div id="wrap">
<h1>✏️ Wordle</h1>
<div id="stats">
  <div class="sb"><span class="sl">WINS</span><span class="sv" id="wins">0</span></div>
  <div class="sb"><span class="sl">STREAK</span><span class="sv" id="streak">0</span></div>
  <div class="sb"><span class="sl">BEST</span><span class="sv" id="best">—</span></div>
</div>
<div id="msg"></div>
<div id="grid"></div>
<div id="keyboard"></div>
<button class="btn" id="newBtn" style="display:none">🔄 New Word</button>
<a href="index.html" class="hub-link" style="margin-top:8px">🏠 Back to Hub</a>
</div>
<script>
const WORDS=['CRANE','SLATE','AUDIO','STARE','RAISE','AROSE','IRATE','SNARE','ATONE','ALONE','ADORE','ADOBE','ABODE','ABOVE','ABUSE','ACUTE','ADMIT','ADOPT','ADULT','AFTER','AGAIN','AGENT','AGREE','AHEAD','ALARM','ALBUM','ALERT','ALIEN','ALIGN','ALIKE','ALIVE','ALLEY','ALLOW','ALOFT','ALONG','ALOUD','ALTER','ANGEL','ANGER','ANGLE','ANGRY','ANIME','ANKLE','ANNEX','ANTIC','ANVIL','APART','APPLE','APPLY','ARENA','ARGUE','ARISE','ARMOR','AROMA','ARRAY','ARROW','ASIDE','ASKED','ATLAS','ATTIC','AUDIO','AUDIT','AVOID','AWAKE','AWARD','AWARE','AWFUL','BADLY','BAKER','BASIC','BASIS','BATCH','BEACH','BEARD','BEAST','BEGAN','BEGIN','BEING','BELOW','BENCH','BIBLE','BIRTH','BLACK','BLADE','BLAME','BLAND','BLANK','BLAST','BLAZE','BLEED','BLEND','BLESS','BLIND','BLOCK','BLOOD','BLOOM','BLOWN','BOARD','BONUS','BOOST','BOOTH','BOUND','BRAIN','BRAND','BRAVE','BREAD','BREAK','BREED','BRICK','BRIDE','BRIEF','BRING','BROAD','BROKE','BROOK','BROWN','BRUSH','BUILD','BUILT','BUNCH','BURST','BUYER','CABIN','CABLE','CAMEL','CANDY','CARRY','CATCH','CAUSE','CHAIN','CHAIR','CHAOS','CHARM','CHART','CHASE','CHEAP','CHECK','CHEEK','CHESS','CHEST','CHIEF','CHILD','CHINA','CHOIR','CHUNK','CIVIC','CIVIL','CLAIM','CLAMP','CLANG','CLASH','CLASS','CLEAN','CLEAR','CLERK','CLICK','CLIFF','CLIMB','CLING','CLOCK','CLONE','CLOSE','CLOTH','CLOUD','CLOWN','COACH','COAST','COBRA','COMET','COMIC','COMMA','CORAL','COULD','COUNT','COURT','COVER','CRACK','CRAFT','CRASH','CRAZY','CREAM','CREEK','CRIME','CRISP','CROSS','CROWD','CROWN','CRUEL','CRUSH','CURVE','CYCLE','DAILY','DANCE','DEATH','DEBUT','DECAY','DECOY','DELAY','DELTA','DENSE','DEPOT','DEPTH','DERBY','DEVIL','DIGIT','DIRTY','DISCO','DITCH','DIVER','DIZZY','DODGE','DOING','DOUBT','DOUGH','DRAFT','DRAIN','DRAMA','DRANK','DRAWN','DREAM','DRESS','DRIFT','DRINK','DRIVE','DROVE','DROWN','DRYER','DYING','EAGER','EAGLE','EARLY','EARTH','EIGHT','ELITE','EMPTY','ENEMY','ENJOY','ENTER','ENTRY','EQUAL','ERROR','ESSAY','EVERY','EXACT','EXIST','EXTRA','FABLE','FACED','FAINT','FAITH','FALSE','FANCY','FATAL','FAULT','FEAST','FENCE','FEVER','FIBER','FIELD','FIFTH','FIFTY','FIGHT','FINAL','FIRST','FIXED','FLAME','FLASH','FLASK','FLEET','FLESH','FLOAT','FLOOD','FLOOR','FLOUR','FLUID','FLUTE','FOCUS','FORCE','FORGE','FORTH','FORUM','FOUND','FRAME','FRANK','FRAUD','FRESH','FRONT','FROST','FROZE','FRUIT','FULLY','FUNNY','GHOST','GIANT','GIVEN','GLAND','GLASS','GLOBE','GLOOM','GLORY','GLOVE','GOING','GRACE','GRADE','GRAIN','GRAND','GRANT','GRASP','GRASS','GRAVE','GREAT','GREED','GREEN','GREET','GRIEF','GRILL','GRIND','GROAN','GROIN','GROOM','GROSS','GROUP','GROVE','GROWN','GUARD','GUESS','GUEST','GUIDE','GUILD','GUILT','GUISE','GUSTO','HABIT','HAPPY','HARSH','HASTE','HAVEN','HEART','HEAVY','HENCE','HERBS','HINGE','HIPPO','HOIST','HOLLY','HONOR','HORSE','HOTEL','HOUSE','HUMAN','HUMOR','HURRY','HYPER','IDEAL','IMAGE','IMPLY','INDEX','INDIE','INFER','INNER','INPUT','INTER','INTRO','ISSUE','IVORY','JEWEL','JOINT','JOKER','JUDGE','JUICE','JUICY','JUMBO','KARMA','KAYAK','KNEEL','KNIFE','KNOCK','KNOWN','LABEL','LANCE','LARGE','LASER','LATER','LAUGH','LAYER','LEARN','LEASE','LEAST','LEAVE','LEGAL','LEMON','LEVEL','LIGHT','LIMIT','LINEN','LIVER','LOCAL','LODGE','LOGIC','LOOSE','LOVER','LOWER','LUCKY','LUNAR','LYRIC','MAGIC','MAJOR','MAKER','MANOR','MAPLE','MARCH','MATCH','MAYOR','MEDIA','MERCY','MERIT','METAL','MIGHT','MINOR','MINUS','MIXED','MODEL','MONEY','MONTH','MORAL','MOTOR','MOUNT','MOUSE','MOUTH','MOVED','MOVIE','MUSIC','NAIVE','NERVE','NEVER','NIGHT','NOBLE','NOISE','NORTH','NOTED','NOVEL','NURSE','NYMPH','OCCUR','OCEAN','OFFER','OFTEN','OLIVE','ONSET','OPERA','ORBIT','ORDER','OTHER','OUTER','OXIDE','OZONE','PAINT','PANEL','PANIC','PAPER','PARTY','PASTA','PATCH','PAUSE','PEACE','PEARL','PEDAL','PENNY','PHASE','PHONE','PHOTO','PIANO','PILOT','PIXEL','PIZZA','PLACE','PLAIN','PLANE','PLANT','PLATE','PLAZA','PLEAD','PLUCK','PLUMB','PLUME','PLUMP','PLUNGE','POINT','POLAR','POPPY','PORCH','POWER','PRESS','PRICE','PRIDE','PRIME','PRINT','PRIOR','PRIZE','PROBE','PRONE','PROOF','PROSE','PROUD','PROVE','PSALM','PULSE','PUNCH','PUPIL','PURSE','QUEEN','QUERY','QUEST','QUEUE','QUICK','QUIET','QUOTA','QUOTE','RADAR','RADIO','RALLY','RANCH','RANGE','RAPID','RATIO','REACH','READY','REALM','REBEL','REFER','REIGN','RELAX','REPAY','REPEL','REPLY','RIDER','RIDGE','RIFLE','RIGHT','RISKY','RIVAL','RIVER','ROBOT','ROCKY','ROUGE','ROUGH','ROUND','ROUTE','ROYAL','RUGBY','RULER','RURAL','SADLY','SAINT','SALAD','SAUCE','SCALE','SCARE','SCENE','SCOPE','SCORE','SCOUT','SEIZE','SENSE','SERVE','SETUP','SEVEN','SHADE','SHAFT','SHAKE','SHALL','SHAME','SHAPE','SHARE','SHARK','SHARP','SHEER','SHELF','SHELL','SHIFT','SHINE','SHIRT','SHOCK','SHOOT','SHORT','SHOUT','SIGHT','SIGMA','SILLY','SINCE','SIXTH','SIXTY','SIZED','SKILL','SKULL','SLAVE','SLEEP','SLICE','SLIDE','SLOPE','SMART','SMELL','SMILE','SMOKE','SNAKE','SOLAR','SOLID','SOLVE','SORRY','SOUTH','SPACE','SPARE','SPARK','SPEAK','SPEED','SPEND','SPICE','SPIKE','SPINE','SPITE','SPLIT','SPOKE','SPOON','SPORT','SPRAY','SQUAD','STACK','STAFF','STAGE','STAIN','STALL','STAMP','STAND','START','STATE','STAYS','STEAM','STEEL','STEEP','STEER','STERN','STICK','STIFF','STILL','STOCK','STONE','STOOD','STORE','STORM','STORY','STOVE','STRAP','STRAW','STRIP','STUCK','STUDY','STUFF','STYLE','SUGAR','SUITE','SUNNY','SUPER','SURGE','SWAMP','SWEAR','SWEEP','SWEET','SWEPT','SWIFT','SWING','SWORD','TABLE','TASTE','TEACH','TEETH','TEMPO','TENSE','TENTH','TERMS','THEIR','THEME','THERE','THESE','THICK','THING','THINK','THIRD','THOSE','THREE','THREW','THROW','THUMB','TIGER','TIGHT','TIMER','TIRED','TITLE','TODAY','TOKEN','TOPIC','TOTAL','TOUCH','TOUGH','TOWER','TOXIC','TRACE','TRACK','TRADE','TRAIL','TRAIN','TRAIT','TRAMP','TRASH','TREAT','TREND','TRIAL','TRIBE','TRICK','TRIED','TROOP','TROUT','TRUCK','TRULY','TRUMP','TRUNK','TRUST','TRUTH','TUMOR','TUNER','TWICE','TWIST','ULTRA','UNCLE','UNDER','UNIFY','UNION','UNITY','UNTIL','UPPER','UPSET','URBAN','USAGE','USUAL','UTTER','VALID','VALUE','VALVE','VAPOR','VAULT','VERSE','VIDEO','VIGOR','VIRAL','VIRUS','VISIT','VISTA','VITAL','VIVID','VOCAL','VOICE','VOTER','VAGUE','WASTE','WATCH','WATER','WEARY','WEAVE','WEDGE','WEIGH','WEIRD','WHALE','WHEAT','WHEEL','WHERE','WHICH','WHILE','WHITE','WHOLE','WHOSE','WIDER','WITCH','WOMAN','WOMEN','WORLD','WORRY','WORSE','WORST','WORTH','WOULD','WOUND','WRATH','WRITE','WROTE','YACHT','YIELD','YOUNG','YOUTH','ZEBRA','ZESTY'];
let target,guesses,current,gameOver,wins=parseInt(localStorage.getItem('wordleWins')||'0'),streak=parseInt(localStorage.getItem('wordleStreak')||'0');
document.getElementById('wins').textContent=wins;
document.getElementById('streak').textContent=streak;
document.getElementById('best').textContent=localStorage.getItem('wordleBest')||'—';
document.getElementById('nav-hs').textContent=wins;

function newGame(){
  target=WORDS[Math.floor(Math.random()*WORDS.length)];
  guesses=[];current='';gameOver=false;
  document.getElementById('msg').textContent='';
  document.getElementById('newBtn').style.display='none';
  buildGrid();buildKeyboard();
}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<6;r++){
    const row=document.createElement('div');row.className='row';row.id='row-'+r;
    for(let c=0;c<5;c++){const t=document.createElement('div');t.className='tile';t.id=`t-${r}-${c}`;row.appendChild(t);}
    g.appendChild(row);
  }
}

function buildKeyboard(){
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']].forEach(row=>{
    const r=document.createElement('div');r.className='kb-row';
    row.forEach(k=>{
      const b=document.createElement('button');b.className='key'+(k.length>1?' wide':'');b.textContent=k;b.dataset.key=k;
      b.addEventListener('click',()=>handleKey(k));r.appendChild(b);
    });
    kb.appendChild(r);
  });
}

function handleKey(k){
  if(gameOver)return;
  if(k==='⌫'||k==='Backspace'){current=current.slice(0,-1);}
  else if(k==='ENTER'||k==='Enter'){submitGuess();}
  else if(/^[A-Z]$/.test(k)&&current.length<5){current+=k;}
  updateCurrentRow();
}

function updateCurrentRow(){
  const row=guesses.length;
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${row}-${c}`);
    t.textContent=current[c]||'';
    t.className='tile'+(current[c]?' filled':'');
  }
}

function submitGuess(){
  if(current.length<5){document.getElementById('msg').textContent='⚠️ Type 5 letters!';return;}
  if(!WORDS.includes(current)){document.getElementById('msg').textContent='⚠️ Not in word list!';return;}
  document.getElementById('msg').textContent='';
  const row=guesses.length;
  const result=score(current);
  guesses.push(current);
  result.forEach((cls,c)=>{
    setTimeout(()=>{
      const t=document.getElementById(`t-${row}-${c}`);
      t.className='tile '+cls;
      updateKeyboard(current[c],cls);
    },c*120);
  });
  if(current===target){
    setTimeout(()=>{
      wins++;streak++;
      const best=parseInt(localStorage.getItem('wordleBest')||'99');
      if(guesses.length<best)localStorage.setItem('wordleBest',guesses.length);
      localStorage.setItem('wordleWins',wins);localStorage.setItem('wordleStreak',streak);
      document.getElementById('wins').textContent=wins;document.getElementById('streak').textContent=streak;
      document.getElementById('best').textContent=localStorage.getItem('wordleBest');
      document.getElementById('nav-hs').textContent=wins;
      document.getElementById('msg').textContent=`🎉 ${['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][guesses.length-1]}`;
      document.getElementById('newBtn').style.display='block';
      gameOver=true;
    },700);
  } else if(guesses.length===6){
    setTimeout(()=>{
      streak=0;localStorage.setItem('wordleStreak',0);document.getElementById('streak').textContent=0;
      document.getElementById('msg').textContent=`💀 The word was ${target}`;
      document.getElementById('newBtn').style.display='block';gameOver=true;
    },700);
  }
  current='';
}

function score(guess){
  const res=Array(5).fill('absent');
  const tArr=[...target],gArr=[...guess];
  gArr.forEach((l,i)=>{if(l===tArr[i]){res[i]='correct';tArr[i]=null;gArr[i]=null;}});
  gArr.forEach((l,i)=>{if(!l)return;const j=tArr.indexOf(l);if(j!==-1){res[i]='present';tArr[j]=null;}});
  return res;
}

function updateKeyboard(letter,cls){
  const btn=document.querySelector(`.key[data-key="${letter}"]`);
  if(!btn)return;
  const priority={correct:3,present:2,absent:1};
  const cur=priority[btn.dataset.state||'']||0;
  if((priority[cls]||0)>cur){btn.className='key'+( letter.length>1?' wide':'')+' '+cls;btn.dataset.state=cls;}
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey)return;
  if(e.key==='Backspace')handleKey('⌫');
  else if(e.key==='Enter')handleKey('ENTER');
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
});
document.getElementById('newBtn').addEventListener('click',newGame);
newGame();
</script>
</body>
</html>
