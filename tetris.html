<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧱 Neon Tetris — NeonArcade</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="game-shell.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#050510;color:#e0e0e0;font-family:'Rajdhani','Segoe UI',sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:70px 16px 40px;overflow-x:hidden}
    #bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
    #wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:360px}
    h1{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;color:#cc66ff;text-shadow:0 0 20px #cc66ff99;letter-spacing:3px}
    #stats{display:flex;gap:20px;background:#0d0d1e;border:1px solid #1e1e3a;border-radius:12px;padding:8px 20px;width:100%;justify-content:space-around}
    .sb{display:flex;flex-direction:column;align-items:center;gap:2px}
    .sl{font-size:0.6rem;letter-spacing:2px;color:#444;font-family:'Orbitron',sans-serif}
    .sv{font-size:1rem;font-weight:700;color:#cc66ff;font-family:'Orbitron',sans-serif}
    #canvas-wrap{position:relative;border-radius:10px;overflow:hidden;box-shadow:0 0 40px #cc66ff22}
    canvas{display:block}
    #overlay{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;background:#05051099;backdrop-filter:blur(6px);border-radius:10px;z-index:10}
    #overlay.hidden{display:none}
    #obox{background:#0d0d1e;border:1px solid #cc66ff;border-radius:16px;padding:28px 36px;text-align:center;box-shadow:0 0 40px #cc66ff33;animation:popIn .3s ease}
    @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    #obox h2{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:#cc66ff;margin-bottom:8px}
    #obox p{color:#666;font-size:.9rem;margin-bottom:20px}
    .btn{padding:10px 28px;background:#cc66ff;color:#050510;border:none;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;margin:4px}
    .btn:hover{transform:scale(1.05);box-shadow:0 0 16px #cc66ff88}
    .btn.ghost{background:transparent;border:1px solid #cc66ff44;color:#cc66ff}
    .btn.ghost:hover{background:#cc66ff22}
    #mobile-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    #mobile-btns button{padding:10px 18px;background:#0d0d1e;border:1px solid #2a2a3e;border-radius:10px;color:#cc66ff;font-size:1.1rem;cursor:pointer;transition:all .1s;user-select:none}
    #mobile-btns button:active{background:#cc66ff33;transform:scale(.92)}
    #next-wrap{background:#0d0d1e;border:1px solid #1e1e3a;border-radius:12px;padding:12px;text-align:center}
    #next-label{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:2px;color:#444;margin-bottom:6px}
    #nextCanvas{display:block;margin:0 auto}
  </style>
</head>
<body>
  <nav class="game-nav">
    <a href="index.html" class="back-btn">← Hub</a>
    <span class="game-nav-title">🧱 Neon Tetris</span>
    <span class="game-nav-hs">🏆 <span id="nav-hs">0</span></span>
  </nav>
  <canvas id="bgCanvas"></canvas>
  <div id="wrap">
    <h1>🧱 Neon Tetris</h1>
    <div id="stats">
      <div class="sb"><span class="sl">SCORE</span><span class="sv" id="score">0</span></div>
      <div class="sb"><span class="sl">LEVEL</span><span class="sv" id="level">1</span></div>
      <div class="sb"><span class="sl">LINES</span><span class="sv" id="lines">0</span></div>
      <div class="sb"><span class="sl">BEST</span><span class="sv" id="best">0</span></div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div id="canvas-wrap">
        <canvas id="gc" width="200" height="400"></canvas>
        <div id="overlay">
          <div id="obox">
            <h2 id="otitle">🧱 Neon Tetris</h2>
            <p id="omsg">Stack blocks, clear lines!</p>
            <button class="btn" id="startBtn">▶ START</button>
            <br/><a href="index.html" class="hub-link" style="margin-top:10px;display:inline-block">🏠 Hub</a>
          </div>
        </div>
      </div>
      <div id="next-wrap">
        <div id="next-label">NEXT</div>
        <canvas id="nextCanvas" width="80" height="80"></canvas>
      </div>
    </div>
    <div id="mobile-btns">
      <button id="btn-left">◀</button>
      <button id="btn-rotate">↻</button>
      <button id="btn-right">▶</button>
      <button id="btn-down">▼</button>
    </div>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
